<script>
/* ================= PERSISTENCE (6AM daily reset) ================= */
const STORE_KEY='life-dashboard-v1', RESET_HOUR=6;
function pad(n){return String(n).padStart(2,'0');}
function dstr(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function logicalDate(){const d=new Date();if(d.getHours()<RESET_HOUR)d.setDate(d.getDate()-1);return d;}
function logicalDay(){return dstr(logicalDate());}
function logicalYesterday(){const d=logicalDate();d.setDate(d.getDate()-1);return dstr(d);}
function mondayOf(dd){const x=new Date(dd);const wd=(x.getDay()+6)%7;x.setDate(x.getDate()-wd);x.setHours(0,0,0,0);return x;}
let store={day:'',routine:{checked:{},streak:0,lastCompleted:''},schedule:{checked:{}},shop:{checked:{}},habit:{streak:0,total:0,lastDate:''},mealAnchor:'',mealWeekAdjust:0};
function saveStore(){try{localStorage.setItem(STORE_KEY,JSON.stringify(store));}catch(e){}}
function loadStore(){
  try{const r=localStorage.getItem(STORE_KEY);if(r)store=Object.assign(store,JSON.parse(r));}catch(e){}
  store.routine=store.routine||{checked:{},streak:0,lastCompleted:''};store.schedule=store.schedule||{checked:{}};
  store.shop=store.shop||{checked:{}};store.habit=store.habit||{streak:0,total:0,lastDate:''};
  if(!store.mealAnchor)store.mealAnchor=dstr(mondayOf(new Date()));
  if(typeof store.mealWeekAdjust!=='number')store.mealWeekAdjust=0;
  rolloverIfNeeded();saveStore();
}
function rolloverIfNeeded(){const day=logicalDay();if(store.day!==day){store.day=day;store.routine.checked={};store.schedule.checked={};return true;}return false;}

/* ================= TIME helpers ================= */
const WD_JP=['日','月','火','水','木','金','土'];
function timeToMin(t){if(!t)return null;const p=t.split(':');return +p[0]*60+ +p[1];}
function nowMin(){const d=new Date();return d.getHours()*60+d.getMinutes();}
function todayWeekdayJP(){return WD_JP[logicalDate().getDay()];}
function isWeekend(){const wd=logicalDate().getDay();return wd===0||wd===6;}
function currentMealWeek(){const a=mondayOf(new Date(store.mealAnchor+'T00:00:00')),m=mondayOf(logicalDate());const w=Math.round((m-a)/(7*864e5));return ((w+store.mealWeekAdjust)%4+4)%4+1;}
function fmt(s){s=Math.max(s,0);const m=Math.floor(s/60);return m+':'+String(s%60).padStart(2,'0');}

      +'<div style="font-size:12.5px;color:#868c8f;min-height:1.2em;">'+(st.cue||'')+'</div>'
      +'<div style="display:flex;gap:10px;justify-content:center;margin-top:18px;"><button data-act="playPrev" style="border:1px solid #E6E7E0;background:#fff;font-family:inherit;font-weight:700;font-size:14px;padding:12px 18px;border-radius:12px;cursor:pointer;color:#20242A;">前へ</button><button data-act="playToggle" style="border:none;background:#E8805A;color:#fff;font-family:inherit;font-weight:800;font-size:14px;padding:12px 26px;border-radius:12px;cursor:pointer;min-width:110px;">'+(w.running?'一時停止':'再開')+'</button><button data-act="playNext" style="border:1px solid #E6E7E0;background:#fff;font-family:inherit;font-weight:700;font-size:14px;padding:12px 18px;border-radius:12px;cursor:pointer;color:#20242A;">次へ</button></div>'
      +'<div style="font-size:12px;color:#a7ada6;margin-top:16px;">'+(w.idx+1)+' / '+w.seq.length+'</div></div>';
  }else{
    inner=head('')+'<div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:0 24px;"><div style="font-size:52px;">🎉</div><div style="font-size:24px;font-weight:900;color:#20242A;margin-top:6px;">運動完了！</div><div style="font-size:14px;color:#868c8f;margin-top:10px;line-height:1.6;">今朝も体を動かせました。<br>シャワーでさっぱりしましょう。</div><button data-act="closeWorkout" style="margin-top:26px;background:#E8805A;color:#fff;border:none;font-family:inherit;font-weight:800;font-size:15px;padding:14px 34px;border-radius:14px;cursor:pointer;">ルーティンに戻る</button></div>';
  }
  el.style.cssText='position:fixed;inset:0;max-width:430px;margin:0 auto;z-index:60;background:#ECEDE7;display:flex;flex-direction:column;';
  el.innerHTML=inner;el.classList.add('show');
}
function woTick(){const w=ui.wo;if(!w.running)return;w.remain--;const st=w.seq[w.idx]||{},c=document.getElementById('wClock'),rg=document.getElementById('wRing');if(c)c.textContent=fmt(Math.max(w.remain,0));if(rg)rg.setAttribute('stroke-dashoffset',(540.35*(1-(Math.max(w.remain,0)/(st.sec||1)))).toFixed(1));if(w.remain<=0){try{navigator.vibrate&&navigator.vibrate(120);}catch(e){}woAdvance();}}
function startWoTimer(){clearInterval(ivWo);ivWo=setInterval(woTick,1000);}
function woAdvance(){const w=ui.wo;if(w.idx+1>=w.seq.length){clearInterval(ivWo);w.running=false;w.phase='done';renderWorkout();}else{w.idx++;w.remain=w.seq[w.idx].sec;renderWorkout();if(w.running)startWoTimer();}}

/* ================= ACTIONS ================= */
function switchTab(name){ui.tab=name;document.querySelectorAll('.pane').forEach(p=>p.classList.toggle('show',p.id==='tab-'+name));renderTabbar();if(name==='home')renderHome();if(name==='routine')renderRoutine();if(name==='schedule')renderSchedule();if(name==='meal')renderMeal();const sc=document.querySelector('.scroll');if(sc)sc.scrollTop=0;window.scrollTo(0,0);}
document.addEventListener('click',e=>{
  const t=e.target.closest('[data-act]');if(!t)return;const a=t.dataset.act;
  switch(a){
    case 'tab': switchTab(t.dataset.val);break;
    case 'toggleR':{const id=t.dataset.id;store.routine.checked[id]=!store.routine.checked[id];updateStreakOnComplete();saveStore();renderRoutine();break;}
    case 'routineReset': store.routine.checked={};saveStore();renderRoutine();break;
    case 'toggleS':{const i=t.dataset.i;store.schedule.checked[i]=!store.schedule.checked[i];saveStore();renderSchedule();break;}
    case 'schedReset': store.schedule.checked={};saveStore();renderSchedule();break;
    case 'mealView': ui.mealView=t.dataset.val;renderMeal();break;
    case 'week': ui.week=+t.dataset.val;renderMeal();break;
    case 'shopToggle':{const k=t.dataset.key,wk='w'+ui.week;if(!store.shop.checked[wk])store.shop.checked[wk]={};store.shop.checked[wk][k]=!store.shop.checked[wk][k];saveStore();renderMeal();break;}
    case 'mealDetail': ui.sheet={open:true,w:+t.dataset.w,d:t.dataset.d};renderSheet();break;
    case 'closeSheet': ui.sheet.open=false;renderSheet();break;
    case 'stop': e.stopPropagation();break;
    case 'openReset': ui.reset={open:true,phase:'start',task:'',min:5,remain:300,running:false,lastIdx:ui.reset.lastIdx};renderReset();break;
    case 'closeReset': clearInterval(ivReset);ui.reset.open=false;ui.reset.running=false;renderReset();break;
    case 'resetBegin': ui.reset.phase='task';ui.reset.task=pickHabit();ui.reset.min=5;ui.reset.remain=300;ui.reset.running=true;renderReset();startResetTimer();break;
    case 'resetMin': ui.reset.min=+t.dataset.val;ui.reset.remain=ui.reset.min*60;ui.reset.running=true;renderReset();startResetTimer();break;
    case 'resetToggle': ui.reset.running=!ui.reset.running;if(ui.reset.running)startResetTimer();else clearInterval(ivReset);renderReset();break;
    case 'resetSwap': ui.reset.task=pickHabit();ui.reset.remain=ui.reset.min*60;ui.reset.running=true;renderReset();startResetTimer();break;
    case 'resetDone': resetDone();break;
    case 'resetMore': ui.reset.phase='task';ui.reset.task=pickHabit();ui.reset.remain=ui.reset.min*60;ui.reset.running=true;renderReset();startResetTimer();break;
    case 'openWorkout': ui.wo={open:true,phase:'list',seq:[],idx:0,remain:0,running:false};renderWorkout();break;
    case 'closeWorkout': clearInterval(ivWo);ui.wo.open=false;ui.wo.running=false;renderWorkout();break;
    case 'workoutBegin':{const seq=buildSeq();ui.wo.seq=seq;ui.wo.idx=0;ui.wo.remain=seq[0]?seq[0].sec:0;ui.wo.phase='play';ui.wo.running=true;renderWorkout();startWoTimer();break;}
    case 'playToggle': ui.wo.running=!ui.wo.running;if(ui.wo.running)startWoTimer();else clearInterval(ivWo);renderWorkout();break;
    case 'playNext':{const w=ui.wo;if(w.idx+1>=w.seq.length){clearInterval(ivWo);w.running=false;w.phase='done';}else{w.idx++;w.remain=w.seq[w.idx].sec;}renderWorkout();if(w.running&&w.phase==='play')startWoTimer();break;}
    case 'playPrev':{const w=ui.wo;w.idx=Math.max(0,w.idx-1);w.remain=w.seq[w.idx]?w.seq[w.idx].sec:0;renderWorkout();if(w.running)startWoTimer();break;}
  }
});
document.getElementById('mealSheet').addEventListener('click',e=>{if(e.target.id==='mealSheet'){ui.sheet.open=false;renderSheet();}});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){if(ui.sheet.open){ui.sheet.open=false;renderSheet();}else if(ui.wo.open){clearInterval(ivWo);ui.wo.open=false;renderWorkout();}else if(ui.reset.open){clearInterval(ivReset);ui.reset.open=false;renderReset();}}});
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'){rolloverIfNeeded();saveStore();if(ui.tab==='home')renderHome();if(ui.tab==='routine')renderRoutine();if(ui.tab==='schedule')renderSchedule();if(ui.tab==='meal')renderMeal();}});
setInterval(()=>{if(ui.tab==='home')renderHome();if(ui.tab==='schedule')renderSchedule();},60000);

/* ---- boot ---- */
loadStore();
ui.week=currentMealWeek();
renderTabbar();renderHome();renderRoutine();renderSchedule();renderMeal();
</script>
</body>
</html>
